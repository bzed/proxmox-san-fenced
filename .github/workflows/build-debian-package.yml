name: Build Debian Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y debhelper fakeroot dpkg-dev curl ca-certificates git build-essential

      - name: Generate upstream tarball
        run: |
          # The package version in debian/changelog is 0.1.0-1.
          # For a non-native (3.0 quilt) package, we need the original upstream tarball in the parent directory.
          tar --exclude='./debian' --exclude='./.git' --exclude='./target' -czf ../pve-san-fenced_0.1.0.orig.tar.gz .

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc
          mkdir -p debian-build
          mv ../pve-san-fenced_* ../pve-san-fenced-dbgsym_* debian-build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-artifacts
          path: debian-build/
